name: CF优选IP自动更新
on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点（北京时间上午10点）
  workflow_dispatch:       # 支持手动触发

jobs:
  speedtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 下载CloudflareST
        run: |
          wget https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/CloudflareSpeedTest_linux_amd64.tar.gz
          tar -xzf CloudflareSpeedTest_linux_amd64.tar.gz
          chmod +x cfst
          
      - name: 运行测速
        run: |
          ./cfst -t 10 -dn 10 -dt 3 -n 10 -o result.csv
          
      - name: 更新CF DNS
        run: |
          # 获取最优IP
          BEST_IP=$(sed -n '2p' result.csv | cut -d',' -f1)
          echo "最优IP: $BEST_IP"
          
          # 获取DNS记录ID
          RECORD_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records?type=A&name=${{ secrets.CF_DOMAIN }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" | python3 -c "import sys,json;print(json.load(sys.stdin)['result'][0]['id'])")
          
          # 更新DNS记录
          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"${{ secrets.CF_DOMAIN }}\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}"
          
          echo "DNS已更新为: $BEST_IP"
