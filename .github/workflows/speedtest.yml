name: CF优选IP自动更新
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  speedtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 下载并运行CloudflareST
        run: |
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/CloudflareSpeedTest_linux_amd64.tar.gz
          tar -xzf CloudflareSpeedTest_linux_amd64.tar.gz
          chmod +x cfst
          ./cfst -t 5 -dn 5 -dt 2 -n 5 -tl 1000 -o result.csv
          cat result.csv
          
      - name: 更新CF DNS
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DOMAIN: ${{ secrets.CF_DOMAIN }}
        run: |
          BEST_IP=$(awk -F',' 'NR==2 {print $1}' result.csv)
          echo "最优IP: $BEST_IP"
          
          if [ -z "$BEST_IP" ]; then
            echo "未获取到有效IP，跳过更新"
            exit 0
          fi
          
          RECORD_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=$DOMAIN" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json;data=json.load(sys.stdin);print(data['result'][0]['id'] if data.get('result') else '')")
          
          if [ -n "$RECORD_ID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$DOMAIN\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}"
            echo "DNS已更新为: $BEST_IP"
          else
            echo "未找到DNS记录"
          fi
