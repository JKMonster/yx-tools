name: cf-optimize
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 更新DNS
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ZID: ${{ secrets.CF_ZONE_ID }}
          DOM: ${{ secrets.CF_DOMAIN }}
        run: |
          # 已知优选IP列表（电信/移动）
          IPS=("172.64.52.124" "162.159.58.65" "104.25.246.239")
          # 随机选一个
          IP=${IPS[$RANDOM % ${#IPS[@]}]}
          echo "选择IP: $IP"
          RID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records?type=A&name=$DOM" -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin)['result'][0]['id'])")
          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records/$RID" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" --data "{\"type\":\"A\",\"name\":\"$DOM\",\"content\":\"$IP\",\"ttl\":1,\"proxied\":false}"
          echo "DNS已更新为: $IP"
